name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: llmbench_test
          POSTGRES_PASSWORD: llmbench
          POSTGRES_USER: llmbench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llmbench -d llmbench_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SKIP_ENV_VALIDATION: "true"
      TEST_DATABASE_URL: postgresql://llmbench:llmbench@localhost:5432/llmbench_test
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup and install
        uses: ./tooling/github/setup

      - name: Format
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Workspace lint
        run: pnpm lint:ws

      - name: Typecheck
        run: pnpm typecheck

      - name: Boundaries
        run: pnpm boundaries

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Postgres integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  runner-contract:
    name: Runner contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Setup and install
        uses: ./tooling/github/setup

      - name: Runner contract tests
        run: pnpm test:runner-contract
