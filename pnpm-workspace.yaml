packages:
  - apps/*
  - tooling/*
  - packages/*

catalog:
  "@eslint/js": ^9.38.0
  "@tailwindcss/postcss": ^4.1.16
  "@types/node": ^22.18.12
  eslint: ^9.38.0
  prettier: ^3.6.2
  tailwindcss: ^4.1.16
  typescript: ^5.9.3
  vitest: ^3.2.4
  "@vitest/coverage-v8": ^3.2.4
  zod: ^4.1.5

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild

overrides:
  "@types/minimatch": 5.1.2

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
